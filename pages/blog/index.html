  <body>

    <!-- ========== HEADER (injected) ========== -->
    <div data-include="header"></div>

    <main>
      <!-- ========== HERO ========== -->
      <section class="blog-hero" aria-labelledby="blog-hero-title">
        <div class="container">
          <span class="blog-eyebrow-chip"><span class="dot"></span>Field notes</span>
          <h1 id="blog-hero-title">The American Pro <em>Blog</em>.</h1>
          <p>
            Education, news, and inspiration from the American Pro shop floor and the field.
            Install guides, product launches, code and warranty deep-dives, real projects.
          </p>
        </div>
      </section>

      <!-- ========== FEED ========== -->
      <section class="section">
        <div class="container">

          <!-- Category filter row -->
          <div class="blog-filters" role="tablist" aria-label="Filter posts by category">
            <button type="button" class="blog-chip is-active" role="tab" aria-selected="true" data-filter="all">All</button>
            <button type="button" class="blog-chip" role="tab" aria-selected="false" data-filter="Education">Education</button>
            <button type="button" class="blog-chip" role="tab" aria-selected="false" data-filter="News">News</button>
            <button type="button" class="blog-chip" role="tab" aria-selected="false" data-filter="Inspiration">Inspiration</button>
          </div>

          <!-- Card grid (rendered by script below) -->
          <div class="blog-grid" id="blog-grid" aria-live="polite"></div>

          <p class="blog-empty" id="blog-empty" hidden>No posts in this category yet. Check back soon.</p>

        </div>
      </section>
    </main>

    <!-- ========== FOOTER (injected) ========== -->
    <div data-include="footer"></div>

    <script src="../_partials.js?v=2" defer></script>
    <script src="../../js/site.js?v=2" defer></script>

    <script>
      // Blog feed renderer. Reads /pages/blog/posts.json, sorts newest first,
      // renders cards, wires category filter chips. Vanilla JS, no deps.
      (function () {
        const grid = document.getElementById('blog-grid');
        const empty = document.getElementById('blog-empty');
        const chips = document.querySelectorAll('.blog-filters .blog-chip');
        if (!grid) return;

        function fmtDate(iso) {
          // "2026-05-07" -> "May 7, 2026". Parse manually to dodge timezone shift.
          const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || '');
          if (!m) return iso || '';
          const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
          const y = parseInt(m[1], 10);
          const mo = parseInt(m[2], 10) - 1;
          const d = parseInt(m[3], 10);
          return months[mo] + ' ' + d + ', ' + y;
        }

        function escapeHtml(s) {
          return String(s == null ? '' : s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function render(posts) {
          if (!posts.length) {
            grid.innerHTML = '';
            empty.hidden = false;
            return;
          }
          empty.hidden = true;
          grid.innerHTML = posts.map(function (p) {
            const url = 'posts/' + encodeURIComponent(p.slug) + '.html';
            return [
              '<a class="blog-card" data-category="', escapeHtml(p.category), '" href="', url, '">',
                '<div class="blog-card-media">',
                  '<img src="', escapeHtml(p.hero), '" alt="', escapeHtml(p.heroAlt || ''), '" loading="lazy" decoding="async" />',
                '</div>',
                '<div class="blog-card-body">',
                  '<span class="blog-card-tag">', escapeHtml(p.category), '</span>',
                  '<h3 class="blog-card-title">', escapeHtml(p.title), '</h3>',
                  '<p class="blog-card-excerpt">', escapeHtml(p.excerpt || ''), '</p>',
                  '<div class="blog-card-meta">',
                    '<span>', escapeHtml(fmtDate(p.date)), '</span>',
                    p.readMinutes ? '<span aria-hidden="true">·</span><span>' + escapeHtml(p.readMinutes) + ' min read</span>' : '',
                  '</div>',
                '</div>',
              '</a>'
            ].join('');
          }).join('');
        }

        function applyFilter(filter) {
          const cards = grid.querySelectorAll('.blog-card');
          let visible = 0;
          cards.forEach(function (card) {
            const match = filter === 'all' || card.getAttribute('data-category') === filter;
            card.classList.toggle('is-hidden', !match);
            if (match) visible++;
          });
          empty.hidden = visible !== 0;
        }

        chips.forEach(function (chip) {
          chip.addEventListener('click', function () {
            chips.forEach(function (c) {
              c.classList.remove('is-active');
              c.setAttribute('aria-selected', 'false');
            });
            chip.classList.add('is-active');
            chip.setAttribute('aria-selected', 'true');
            applyFilter(chip.getAttribute('data-filter'));
          });
        });

        fetch('posts.json', { cache: 'no-cache' })
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (posts) {
            // Sort newest first by ISO date string (lexicographic works for YYYY-MM-DD).
            posts = (posts || []).slice().sort(function (a, b) {
              return (b.date || '').localeCompare(a.date || '');
            });
            render(posts);
          })
          .catch(function () {
            grid.innerHTML = '';
            empty.hidden = false;
          });
      })();
    </script>
  </body>
