<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="description" content="Browse the TrueGrain cellular PVC decking lookbook by American Pro Building Products. Real wood beauty, none of the wood chores.">
<meta property="og:title" content="TrueGrain Decking Lookbook 2026">

<style>
  :root{
    --navy:#1b263f;
    --navy-deep:#111a2e;
    --red:#be1f31;
    --cream:#f4ecdf;
    --ink:#20242e;
    --panel:#0f1626;
    --shadow:rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%, #223050 0%, var(--navy-deep) 55%, #0a1020 100%);
    color:var(--cream);
    display:flex;flex-direction:column;
    min-height:100dvh;overflow:hidden;
  }

  /* ---------- Toolbar ---------- */
  header{
    display:flex;align-items:center;gap:14px;
    padding:10px 16px;
    background:rgba(10,16,32,.72);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,.08);
    z-index:40;flex:none;
  }
  .brand{display:flex;align-items:baseline;gap:2px;font-weight:800;letter-spacing:.3px;font-size:20px;line-height:1;}
  .brand .t{color:#fff;}
  .brand .g{color:var(--red);}
  .brand .sub{margin-left:10px;font-size:11px;font-weight:600;letter-spacing:2px;color:#8ea0c4;text-transform:uppercase;align-self:center;}
  .spacer{flex:1;}
  .btn{
    display:inline-flex;align-items:center;gap:7px;
    border:1px solid rgba(255,255,255,.16);
    background:rgba(255,255,255,.04);
    color:var(--cream);
    font-size:13px;font-weight:600;
    padding:8px 13px;border-radius:9px;
    cursor:pointer;text-decoration:none;
    transition:background .15s,border-color .15s,transform .1s;
    white-space:nowrap;
  }
  .btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--red);border-color:var(--red);color:#fff;}
  .btn.primary:hover{background:#d8283b;}
  .btn svg{width:16px;height:16px;fill:currentColor;flex:none;}
  .btn .lbl{display:inline;}

  /* ---------- Stage ---------- */
  main{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:18px 64px;min-height:0;}
  #flip{margin:0 auto;touch-action:pan-y;}
  #flip .page{background:#fff;overflow:hidden;box-shadow:0 8px 30px var(--shadow);}
  #flip .page img{width:100%;height:100%;display:block;object-fit:cover;}
  .page-shadow{box-shadow:0 10px 40px var(--shadow);}

  /* nav arrows */
  .nav{
    position:absolute;top:50%;transform:translateY(-50%);
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:rgba(10,16,32,.6);border:1px solid rgba(255,255,255,.18);
    color:#fff;cursor:pointer;z-index:30;transition:background .15s;
  }
  .nav:hover{background:var(--red);border-color:var(--red);}
  .nav svg{width:22px;height:22px;fill:currentColor;}
  #prev{left:12px;}
  #next{right:12px;}
  .nav.disabled{opacity:.28;pointer-events:none;}

  /* ---------- Footer bar ---------- */
  footer{
    flex:none;display:flex;align-items:center;justify-content:center;gap:18px;
    padding:9px 16px;background:rgba(10,16,32,.72);
    border-top:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(10px);z-index:40;flex-wrap:wrap;
  }
  .counter{font-size:13px;color:#b9c4dc;font-variant-numeric:tabular-nums;min-width:74px;text-align:center;}
  .footlinks{display:flex;gap:16px;align-items:center;font-size:13px;flex-wrap:wrap;justify-content:center;}
  .footlinks a{color:var(--cream);text-decoration:none;display:inline-flex;align-items:center;gap:6px;opacity:.9;}
  .footlinks a:hover{opacity:1;color:#fff;}
  .footlinks a svg{width:14px;height:14px;fill:currentColor;opacity:.75;}
  .footlinks .site{color:#9fd0ff;font-weight:600;}

  /* ---------- Thumbnail drawer ---------- */
  .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
  .drawer-backdrop.open{opacity:1;pointer-events:auto;}
  .drawer{
    position:fixed;top:0;left:0;height:100%;width:230px;max-width:82vw;
    background:var(--panel);border-right:1px solid rgba(255,255,255,.1);
    transform:translateX(-105%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:55;display:flex;flex-direction:column;
  }
  .drawer.open{transform:translateX(0);}
  .drawer h3{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#8ea0c4;padding:16px 16px 8px;flex:none;}
  .thumbs{overflow-y:auto;padding:6px 14px 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .thumbs figure{cursor:pointer;border:2px solid transparent;border-radius:6px;overflow:hidden;transition:border-color .15s,transform .1s;background:#fff;}
  .thumbs figure:hover{transform:translateY(-2px);}
  .thumbs figure.active{border-color:var(--red);}
  .thumbs img{width:100%;display:block;}
  .thumbs figcaption{font-size:10px;color:#7f8db0;text-align:center;padding:3px 0;background:var(--panel);}

  /* loading */
  #loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--navy-deep);z-index:80;transition:opacity .4s;}
  #loader.hidden{opacity:0;pointer-events:none;}
  .ring{width:42px;height:42px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loader p{font-size:13px;letter-spacing:1px;color:#8ea0c4;}

  /* responsive */
  @media (max-width:720px){
    main{padding:10px 8px;}
    #prev,#next{display:none;}
    .btn .lbl{display:none;}
    .brand .sub{display:none;}
    .brand{font-size:18px;}
    .footlinks .hidesm{display:none;}
  }
</style>
</head>
<body>

<div id="loader"><div class="ring"></div><p>LOADING LOOKBOOK</p></div>

<header>
  <button class="btn" id="tocBtn" aria-label="Pages">
    <svg viewBox="0 0 24 24"><path d="M3 5h18v2H3zm0 6h18v2H3zm0 6h18v2H3z"/></svg>
    <span class="lbl">Pages</span>
  </button>
  <div class="brand"><span class="t">True</span><span class="g">Grain</span><span class="sub">Decking Lookbook</span></div>
  <div class="spacer"></div>
  <a class="btn" href="https://americanprobp.com" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm6.9 6h-2.9a15.7 15.7 0 00-1.3-3.4A8 8 0 0118.9 8zM12 4c.8 1.1 1.4 2.5 1.8 4h-3.6c.4-1.5 1-2.9 1.8-4zM4.3 14A8 8 0 014 12c0-.7.1-1.4.3-2h3.3a17.6 17.6 0 000 4H4.3zm.8 2h2.9c.3 1.2.8 2.4 1.3 3.4A8 8 0 015.1 16zM7.6 10H4.3a8 8 0 013.5-4c-.5 1-1 2.2-1.3 3.4zm4.4 10c-.8-1.1-1.4-2.5-1.8-4h3.6c-.4 1.5-1 2.9-1.8 4zm2.2-6h-4.4a15.6 15.6 0 010-4h4.4a15.6 15.6 0 010 4zm.5 5.4c.5-1 1-2.2 1.3-3.4h2.9a8 8 0 01-4.2 3.4zM16.4 14a17.6 17.6 0 000-4h3.3c.2.6.3 1.3.3 2s-.1 1.4-.3 2h-3.3z"/></svg>
    <span class="lbl">Visit Site</span>
  </a>
  <a class="btn primary" href="pdf/TrueGrain-Lookbook-2026.pdf" download>
    <svg viewBox="0 0 24 24"><path d="M12 3v10.6l3.3-3.3 1.4 1.4L12 17.4l-4.7-4.7 1.4-1.4L12 13.6V3zM5 19h14v2H5z"/></svg>
    <span class="lbl">Download</span>
  </a>
</header>

<main>
  <div id="prev" class="nav" aria-label="Previous page"><svg viewBox="0 0 24 24"><path d="M15.4 7.4 14 6l-6 6 6 6 1.4-1.4L10.8 12z"/></svg></div>

<footer>
  <span class="counter" id="counter">1 / 12</span>
  <div class="footlinks">

<!-- Thumbnail drawer -->
<div class="drawer-backdrop" id="backdrop"></div>
<nav class="drawer" id="drawer">
  <h3>Jump to Page</h3>
  <div class="thumbs" id="thumbs"></div>
</nav>

<script src="lib/page-flip.browser.js"></script>
<script>
(function(){
  var TOTAL = 12;
  var W = 550, H = 707; // page aspect 630:810
  var flipEl = document.getElementById('flip');
  var counter = document.getElementById('counter');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');

  // Build pages markup
  var html = '';
  for (var i=1;i<=TOTAL;i++){
    var num = ('0'+i).slice(-2);
    html += '<div class="page" data-density="'+((i===1||i===TOTAL)?'hard':'soft')+'">'+
            '<img src="pages/page-'+num+'.jpg" alt="TrueGrain Lookbook page '+i+'">'+
            '</div>';
  }
  flipEl.innerHTML = html;

  function calcSize(){
    var main = document.querySelector('main');
    var availW = main.clientWidth - 20;
    var availH = main.clientHeight - 20;
    var single = window.innerWidth <= 720;
    // in double mode, two pages side by side -> width budget halves
    var perW = single ? availW : availW/2;
    var ratio = W/H;
    var w = perW, h = w/ratio;
    if (h > availH){ h = availH; w = h*ratio; }
    return {w:Math.floor(w), h:Math.floor(h), single:single};
  }

  var pageFlip;
  function buildFlip(){
    var s = calcSize();
    if (pageFlip){ try{ pageFlip.destroy(); }catch(e){} }
    flipEl.innerHTML = html; // rebuild children after destroy
    pageFlip = new St.PageFlip(flipEl, {
      width: s.w, height: s.h,
      size: 'fixed',
      minWidth:200, maxWidth:1200, minHeight:300, maxHeight:1600,
      maxShadowOpacity: 0.5,
      showCover: true,
      mobileScrollSupport: true,
      usePortrait: s.single,
      drawShadow: true,
      flippingTime: 700,
      swipeDistance: 25
    });
    pageFlip.loadFromHTML(document.querySelectorAll('#flip .page'));
    pageFlip.on('flip', function(e){ updateUI(e.data); });
    updateUI(0);
  }

  function updateUI(idx){
    var page = idx+1;
    counter.textContent = page + ' / ' + TOTAL;
    prevBtn.classList.toggle('disabled', idx<=0);
    nextBtn.classList.toggle('disabled', idx>=TOTAL-1);
    // sync active thumb
    document.querySelectorAll('#thumbs figure').forEach(function(f,k){
      f.classList.toggle('active', k===idx);
    });
  }

  prevBtn.addEventListener('click', function(){ pageFlip && pageFlip.flipPrev(); });
  nextBtn.addEventListener('click', function(){ pageFlip && pageFlip.flipNext(); });
  document.addEventListener('keydown', function(e){
    if(e.key==='ArrowLeft') pageFlip && pageFlip.flipPrev();
    if(e.key==='ArrowRight') pageFlip && pageFlip.flipNext();
  });

  // Thumbnails
  var thumbs = document.getElementById('thumbs');
  var thtml='';
  for(var t=1;t<=TOTAL;t++){
    var tn=('0'+t).slice(-2);
    thtml += '<figure data-page="'+(t-1)+'"><img src="thumbs/thumb-'+tn+'.jpg" alt="Page '+t+'"><figcaption>Page '+t+'</figcaption></figure>';
  }
  thumbs.innerHTML=thtml;
  var drawer=document.getElementById('drawer');
  var backdrop=document.getElementById('backdrop');
  function openDrawer(){drawer.classList.add('open');backdrop.classList.add('open');}
  function closeDrawer(){drawer.classList.remove('open');backdrop.classList.remove('open');}
  document.getElementById('tocBtn').addEventListener('click',openDrawer);
  backdrop.addEventListener('click',closeDrawer);
  thumbs.addEventListener('click',function(e){
    var fig=e.target.closest('figure'); if(!fig) return;
    var p=parseInt(fig.getAttribute('data-page'),10);
    if(pageFlip){ pageFlip.flip(p); }
    closeDrawer();
  });

  // Resize (debounced)
  var rt;
  window.addEventListener('resize',function(){
    clearTimeout(rt); rt=setTimeout(buildFlip,250);
  });

  // Preload first few pages then init
  var loaded=0, need=Math.min(4,TOTAL);
  function tick(){ loaded++; if(loaded>=need){ init(); } }
  for(var p=1;p<=need;p++){
    var im=new Image();
    im.onload=tick; im.onerror=tick;
    im.src='pages/page-'+('0'+p).slice(-2)+'.jpg';
  }
  var initialized=false;
  function init(){
    if(initialized) return; initialized=true;
    buildFlip();
    var loader=document.getElementById('loader');
    loader.classList.add('hidden');
    setTimeout(function(){loader.style.display='none';},450);
  }
  // safety timeout
  setTimeout(init, 3500);
})();
</script>
</body>
</html>
